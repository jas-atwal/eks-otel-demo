name: Restore Baseline

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore baseline values
        run: cp scenarios/baseline.yaml values.yaml

      - name: Commit and push
        run: |
          git config user.name "Demo Bot"
          git config user.email "demo@bot.com"
          git add values.yaml
          git commit -m "restore: baseline healthy state"
          git push origin main
