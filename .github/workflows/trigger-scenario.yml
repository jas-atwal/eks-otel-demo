name: Trigger Failure Scenario

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario to trigger'
        required: true
        type: choice
        options:
          - cascading-productcatalog  # Matched to your actual filename
          - oomkilled-cart
          - imagepull-reccomendation
          - cpu-throttling-ad
          - livenessprobe-frontend
          - wrong-envvar-checkout
          - dbconn-ad
          - noisy-neighbor-recommendation
          - all-scenarios
          - baseline

permissions:
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Apply scenario
        run: |
          # The filename must exist in the scenarios/ folder exactly as written above
          cp scenarios/${{ github.event.inputs.scenario }}.yaml values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add values.yaml
          # This '|| echo' trick prevents failure if there is nothing new to commit
          git commit -m "scenario: activate ${{ github.event.inputs.scenario }}" || echo "No changes to commit"
          git push origin main
