name: Trigger Failure Scenario
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario to trigger'
        required: true
        type: choice
        options:
          - cascading-productcatalog
          - oomkilled-cart
          - imagepull-reccomendation
          - cpu-throttling-ad
          - livenessprobe-frontend
          - wrong-envvar-checkout
          - dbconn-ad
          - noisy-neighbour-recommedation
          - all-scenarios
          - baseline
          - autoscaler-node-pressure

permissions:
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: 📋 Apply scenario
        run: |
          echo "Applying scenario: ${{ github.event.inputs.scenario }}"
          cp scenarios/${{ github.event.inputs.scenario }}.yaml values.yaml
      
      - name: 💾 Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add values.yaml
          git commit -m "scenario: activate ${{ github.event.inputs.scenario }}" || echo "No changes to commit"
          git pull --rebase origin main || git merge --no-edit origin/main
          git push origin main
      
      - name: ✅ Done
        run: |
          echo "✅ Scenario committed: ${{ github.event.inputs.scenario }}"
          echo "ArgoCD will auto-sync from the repo"
