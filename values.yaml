components:
  flagd:
    enabled: true
  frontend-proxy:
    enabled: true
    service:
      type: LoadBalancer
  cart:
    resources:
      limits:
        memory: 160Mi
  llm:
    enabled: false

opentelemetry-demo:
  flagd:
    config: |
      {
        "flags": {
          "adFailure": {
            "defaultVariant": "off",
            "state": "ENABLED",
            "variants": { "off": false, "on": true }
          }
        }
      }

grafana:
  enabled: false
jaeger:
  enabled: false
opentelemetry-collector:
  enabled: true
opensearch:
  enabled: false
