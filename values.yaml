components:
flagd:
    enabled: true
    # The '|' allows you to paste the JSON exactly as it is
    defaultConfig: |
      {
        "$schema": "https://flagd.dev/schema/v0/flags.json",
        "flags": {
          "adFailure": {
            "defaultVariant": "off",
            "description": "Fail ad service",
            "state": "ENABLED",
            "variants": {
              "off": false,
              "on": true
            }
          },
          "adHighCpu": {
            "defaultVariant": "off",
            "description": "Triggers high cpu load in the ad service",
            "state": "ENABLED",
            "variants": {
              "off": false,
              "on": true
            }
          }
        }
      }
  frontend-proxy:
    enabled: true
    service:
      type: LoadBalancer
  cart:
    resources:
      limits:
        memory: 160Mi
  llm:
    enabled: false

grafana:
  enabled: false
jaeger:
  enabled: false
opentelemetry-collector:
  enabled: true
opensearch:
  enabled: false
