components:
  flagd:
    enabled: true
  frontend-proxy:
    enabled: true
    service:
      type: LoadBalancer
  cart:
    resources:
      limits:
        memory: 160Mi

######################################################################
################## START OF FAILURE SCENARIOS ########################
######################################################################

  #   # SCENARIO 1: OOMKill cart service
  #     limits:
  #       memory: 20Mi

  # # SCENARIO 2: Bad image tag - ImagePullBackOff on recommendation service  
  # recommendation:
  #   imageOverride:
  #     tag: "broken-tag-does-not-exist"

  # # SCENARIO 3: CPU throttling on ad service
  # ad:
  #   resources:
  #     limits:
  #       cpu: "10m"
  #     requests:
  #       cpu: "10m"

  # # SCENARIO 4: Bad liveness probe - CrashLoopBackOff on frontend
  # frontend:
  #   livenessProbe:
  #     httpGet:
  #       path: /this-does-not-exist
  #       port: 8080
  #     initialDelaySeconds: 10
  #     periodSeconds: 5
  #     failureThreshold: 3

  # # SCENARIO 5: Wrong env var - checkout can't reach shipping service
  # checkout:
  #   envOverrides:
  #     - name: SHIPPING_SERVICE_ADDR
  #       value: "wrong-host:99999"

    # # SCENARIO: Cascading failure - productCatalog OOMKill → frontend + checkout + recommendation degrade
  # # Step 1: productCatalog OOMKills due to memory limit too low
  # # Step 2: frontend fails to load product pages - returns errors to users
  # # Step 3: checkout can't retrieve product details - order flow breaks
  # # Step 4: recommendation service can't fetch products - returns errors
  # # Step 5: Let LOCUST the loadgen do the work

  product-catalog:
    resources:
      limits:
        memory: 8Mi   # default is ~200Mi, this will OOMKill quickly

  load-generator:
    resources:
      limits:
        memory: 256Mi   # give it more headroom to run more workers
    envOverrides:
      - name: LOCUST_USERS
        value: "200"     # default is usually 10-20
      - name: LOCUST_SPAWN_RATE
        value: "20"      # users spawned per second

######################################################################
################## END OF FAILURE SCENARIOS ##########################
######################################################################
  
  llm:
    enabled: false

grafana:
  enabled: false
jaeger:
  enabled: false
opentelemetry-collector:
  enabled: true
opensearch:
  enabled: false
