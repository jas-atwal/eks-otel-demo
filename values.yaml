components:
flagd:
    enabled: true
    defaultConfig: |
      {
        "$schema": "https://flagd.dev/schema/v0/flags.json",
        "flags": {
          "adFailure": {
            "defaultVariant": "off",
            "state": "ENABLED",
            "variants": { "off": false, "on": true }
          },
          "paymentFailure": {
            "defaultVariant": "off",
            "state": "ENABLED",
            "variants": {
              "10%": 0.1,
              "100%": 1,
              "off": 0
            }
          }
        }
      }
  frontend-proxy:
    enabled: true
    service:
      type: LoadBalancer
  cart:
    resources:
      limits:
        memory: 160Mi
  llm:
    enabled: false

grafana:
  enabled: false
jaeger:
  enabled: false
opentelemetry-collector:
  enabled: true
opensearch:
  enabled: false
