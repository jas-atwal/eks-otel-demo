components:
  flagd:
    enabled: true
    extraEnvVars:
      - name: FLAGD_VALUES_INLINE
        value: |
          {
            "flags": {
              "adFailure": {
                "defaultVariant": "off",
                "state": "ENABLED",
                "variants": { "off": false, "on": true }
              }
            }
          }
  frontend-proxy:
    enabled: true
    service:
      type: LoadBalancer
  cart:
    resources:
      limits:
        memory: 160Mi
  llm:
    enabled: false

grafana:
  enabled: false
jaeger:
  enabled: false
opentelemetry-collector:
  enabled: true
opensearch:
  enabled: false
