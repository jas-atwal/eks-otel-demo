components:
  flagd:
    enabled: true
  frontend-proxy:
    enabled: true
    service:
      type: LoadBalancer
  cart:
    resources:
      limits:
        memory: 160Mi
  accounting:
    resources:
      requests:
        cpu: "100m"
        memory: "100Mi"
      limits:
        cpu: "200m"
        memory: "120Mi"
  prometheus:
    enabled: false"
  llm:
    enabled: false

grafana:
  enabled: false
jaeger:
  enabled: false
opentelemetry-collector:
  enabled: true
opensearch:
  enabled: false
