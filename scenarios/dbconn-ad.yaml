components:
  ad:
    envOverrides:
      - name: AD_SERVICE_DB_URL
        value: "postgres://adService:5432/ads"
  flagd:
    enabled: true
  frontend-proxy:
    enabled: true
    service:
      type: LoadBalancer
  cart:
    resources:
      limits:
        memory: 160Mi
  llm:
    enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false
jaeger:
  enabled: false
opentelemetry-collector:
  enabled: true
opensearch:
  enabled: false
