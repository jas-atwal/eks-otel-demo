components:
  frontend-proxy:
    enabled: true
    service:
      type: LoadBalancer

  # SCENARIO: OOMKill cart service
  cart:
    resources:
      limits:
        memory: 20Mi

  # SCENARIO: Bad image tag - ImagePullBackOff on recommendation service  
  recommendation:
    imageOverride:
      tag: "broken-tag-does-not-exist"

  # SCENARIO: CPU throttling on ad service
  ad:
    resources:
      limits:
        cpu: "10m"
      requests:
        cpu: "10m"

  # SCENARIO: Bad liveness probe - CrashLoopBackOff on frontend
  frontend:
    livenessProbe:
      httpGet:
        path: /this-does-not-exist
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 5
      failureThreshold: 3

  # SCENARIO: Wrong env var - checkout can't reach shipping service
  checkout:
    envOverrides:
      - name: SHIPPING_SERVICE_ADDR
        value: "wrong-host:99999"
  
  # SCENARIO: Database Connection Failure - Point the adservice to a DB that doesn't exist
  ad:
    extraEnvVars:
      - name: AD_SERVICE_DB_URL
        value: "postgres://wrong-db:5432/ads"

  # SCENARIO: RBAC / Permission Denied - Assign a service account that doesn't exist or has no roles
  payment:
    serviceAccount:
      create: true
      name: "restricted-no-permissions-account"

  # SCENARIO: Network Latency / Slow Response - flagd is great for this if supported, or via env vars
  product-catalog:
    extraEnvVars:
      - name: EXTRA_LATENCY
        value: "5000ms"

  # SCENARIO: Security Policy Violation - Attempt to run a container as root/privileged
  email:
    securityContext:
      privileged: true
      runAsUser: 0

  llm:
    enabled: false

grafana:
  enabled: false
jaeger:
  enabled: false
opentelemetry-collector:
  enabled: true
opensearch:
  enabled: false
