components:
  frontend-proxy:
    enabled: true
    service:
      type: LoadBalancer

  # SCENARIO: OOMKill cart service
  cart:
    resources:
      limits:
        memory: 20Mi

  # SCENARIO: Bad image tag - ImagePullBackOff on recommendation service  
  recommendation:
    imageOverride:
      tag: "broken-tag-does-not-exist"

  # SCENARIO: CPU throttling on ad service
  ad:
    resources:
      limits:
        cpu: "10m"
      requests:
        cpu: "10m"

  # SCENARIO: Bad liveness probe - CrashLoopBackOff on frontend
  frontend:
    livenessProbe:
      httpGet:
        path: /this-does-not-exist
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 5
      failureThreshold: 3

  # SCENARIO: Wrong env var - checkout can't reach shipping service
  checkout:
    envOverrides:
      - name: SHIPPING_SERVICE_ADDR
        value: "wrong-host:99999"

  llm:
    enabled: false

grafana:
  enabled: false
jaeger:
  enabled: false
opentelemetry-collector:
  enabled: true
opensearch:
  enabled: false
