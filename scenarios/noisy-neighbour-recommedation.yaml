components:
  recommendation:
    resources:
      requests:
        cpu: "2000m"
      limits:
        cpu: "4000m"
    command:
      - "/bin/sh"
      - "-c"
      - "yes > /dev/null & yes > /dev/null & python recommendation_server.py"
    envOverrides:
      - name: CPU_HOG_ENABLED
        value: "true"
  flagd:
    enabled: true
  frontend-proxy:
    enabled: true
    service:
      type: LoadBalancer
  cart:
    resources:
      limits:
        memory: 160Mi
  llm:
    enabled: false

grafana:
  enabled: false
jaeger:
  enabled: false
opentelemetry-collector:
  enabled: true
opensearch:
  enabled: false
